name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['11', '17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13
        with:
          lein: '2.11.2'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: m2-${{ matrix.java }}-${{ hashFiles('project.clj') }}

      - name: Run tests (fail on reflection warnings)
        run: |
          # Capture test exit code — don't let set -e stop us before checking for warnings
          set +e -o pipefail
          lein test 2>&1 | tee test-output.log
          TEST_EXIT=$?
          set -e
          REFLECTION_WARNINGS=$(grep -c "Reflection warning" test-output.log || true)
          if [ "$REFLECTION_WARNINGS" -gt 0 ]; then
            echo ""
            echo "^^^ FAIL: $REFLECTION_WARNINGS reflection warning(s) detected. Fix them before merging."
            grep -n "Reflection warning" test-output.log
            exit 1
          fi
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo ""
            echo "^^^ FAIL: Tests failed (exit code $TEST_EXIT)."
            exit "$TEST_EXIT"
          fi
